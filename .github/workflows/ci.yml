name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Release consistency
        run: python scripts/check_release_consistency.py
      - name: Lint
        run: python -m ruff check .
      - name: Test
        run: python -m pytest -q
      - name: Build wheel
        if: matrix.python-version == '3.11'
        run: python -m pip wheel . --no-deps --wheel-dir dist
      - name: Wheel install smoke
        if: matrix.python-version == '3.11'
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/python -m pip install --upgrade pip
          .venv-wheel/bin/python -m pip install dist/semscrape-*.whl
          .venv-wheel/bin/semscrape doctor
          .venv-wheel/bin/semscrape ranker info
          .venv-wheel/bin/semscrape extract examples/product.yml examples/product_v2.html --policy ranker-local --values-only
      - name: Canary smoke
        if: matrix.python-version == '3.11'
        run: |
          semscrape canary corpus/ood_holdout/manifest.yml --policy ranker-local --out runs/ci-ood-holdout.jsonl
