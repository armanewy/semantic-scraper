name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Test
        run: python -m pytest -q
      - name: CLI smoke
        run: |
          semscrape doctor
          semscrape ranker info
          semscrape extract examples/product.yml examples/product_v2.html --policy ranker-local --values-only
          semscrape canary corpus/ood_holdout/manifest.yml --policy ranker-local --out runs/ci-ood-holdout.jsonl
