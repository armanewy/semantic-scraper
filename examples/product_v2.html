<!doctype html>
<html>
<head><title>Storefront</title></head>
<body>
  <div data-app="shop">
    <main class="x9-root">
      <article class="pdp-shell" data-page="item">
        <div class="gallery"><img alt="portable coffee brewer" src="/assets/p1.jpg"></div>
        <div class="buybox c71">
          <div class="crumbs">Home / Gear / Coffee</div>
          <h1 data-qa="name-primary">AeroPress Go Travel Coffee Press</h1>
          <p class="blurb">Compact coffee maker for travel and small kitchens.</p>
          <ul class="money-list">
            <li class="muted compare">Usually $79.99</li>
            <li class="offer" data-role="deal-price"><strong>Deal:</strong> $59.99</li>
          </ul>
          <div class="social-proof">
            <span>Customer score</span>
            <strong data-qa="stars">4.7</strong>
            <span>from 1,294 reviews</span>
          </div>
          <div data-qa="fulfillment-message">Available now</div>
          <button>Buy now</button>
        </div>
      </article>
      <aside><p>Original list price $129.99 from another seller</p></aside>
    </main>
  </div>
</body>
</html>
