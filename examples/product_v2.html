<!doctype html>
<html>
<head>
  <title>Demo Shop</title>
  <meta name="viewport" content="width=device-width" />
</head>
<body>
  <main class="pdp rev-2026">
    <div class="layout">
      <aside class="recommendations">
        <h2>Customers also viewed</h2>
        <div class="card"><span class="money">$89.00</span></div>
      </aside>
      <article data-page="product">
        <div class="headline-wrap">
          <div class="eyebrow">Acme Audio</div>
          <h1 data-testid="pdp-name">Acme Noise-Canceling Headphones</h1>
        </div>
        <section class="purchase-panel">
          <div class="promo">Save 20% this week</div>
          <strong itemprop="price" content="129.99" class="amount current">$129.99</strong>
          <span class="stars" data-test="review-summary">4.7 out of 5 stars</span>
        </section>
      </article>
    </div>
  </main>
</body>
</html>
