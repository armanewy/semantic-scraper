name: fixture_tables_pricing_table
fields:
  - name: pro_monthly_price
    type: price
    description: Monthly price for the Pro plan, not yearly price or Enterprise price.
    hints: [Pro, monthly, price]
    validators:
      require_currency: true
      regex: ["29"]
  - name: pro_storage
    type: text
    description: Storage limit for the Pro plan.
    hints: [Pro, storage]
    validators:
      regex: ["1 TB"]
  - name: enterprise_monthly_price
    type: price
    description: Monthly price for the Enterprise plan.
    hints: [Enterprise, monthly, price]
    validators:
      require_currency: true
      regex: ["99"]

benchmarks:
  v1.html:
    pro_monthly_price: $29
    pro_storage: 1 TB
    enterprise_monthly_price: $99
  v2_columns_reordered.html:
    pro_monthly_price: $29
    pro_storage: 1 TB
    enterprise_monthly_price: $99
  v3_nested_table.html:
    pro_monthly_price: $29
    pro_storage: 1 TB
    enterprise_monthly_price: $99
